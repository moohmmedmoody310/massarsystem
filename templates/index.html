<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز مسار التعليمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a3c5e;--primary-light:#2980b9;--accent:#27ae60;--accent-light:#2ecc71;
  --gold:#f39c12;--danger:#e74c3c;--bg:#f0f4f8;--white:#fff;
  --text:#2c3e50;--text-muted:#7f8c8d;--border:#dde2e8;
  --sidebar-w:260px;--header-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden}

/* SIDEBAR */
.sidebar{position:fixed;right:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--primary);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-text h2{color:#fff;font-size:14px;font-weight:700}
.logo-text p{color:rgba(255,255,255,0.5);font-size:11px}
nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,0.3);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.6);font-size:14px;font-weight:600;border-right:3px solid transparent;margin:2px 0}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;border-right-color:var(--primary-light)}
.nav-item.active{background:rgba(41,128,185,0.3);color:#fff;border-right-color:var(--accent)}
.nav-item .icon{font-size:18px;width:22px;text-align:center}
.nav-item .badge{margin-right:auto;background:var(--danger);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1)}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.user-name{color:rgba(255,255,255,0.8);font-size:13px;font-weight:600}
.logout-btn{margin-right:auto;background:rgba(231,76,60,0.2);border:none;color:#e74c3c;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;transition:all 0.2s}
.logout-btn:hover{background:rgba(231,76,60,0.35)}

/* MAIN */
.main{margin-right:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.header{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50}
.page-title{font-size:20px;font-weight:700;color:var(--primary);flex:1}
.header-actions{display:flex;align-items:center;gap:12px}
.header-btn{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;transition:all 0.2s}
.header-btn:hover{border-color:var(--primary-light);color:var(--primary-light)}
.content{padding:28px;flex:1}

/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:28px}
.stat-card{background:var(--white);border-radius:16px;padding:24px;display:flex;align-items:center;gap:16px;border:1px solid var(--border);transition:transform 0.2s,box-shadow 0.2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.08)}
.stat-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.stat-icon.blue{background:rgba(41,128,185,0.12)}
.stat-icon.green{background:rgba(39,174,96,0.12)}
.stat-icon.gold{background:rgba(243,156,18,0.12)}
.stat-icon.red{background:rgba(231,76,60,0.12)}
.stat-icon.purple{background:rgba(142,68,173,0.12)}
.stat-info h3{font-size:26px;font-weight:900;color:var(--primary);line-height:1}
.stat-info p{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:600}

/* TABLE */
.table-card{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px}
.table-header{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-header h3{font-size:16px;font-weight:700;color:var(--primary)}
.table-actions{display:flex;gap:10px;align-items:center}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;width:220px;transition:all 0.2s;direction:rtl}
.search-input:focus{border-color:var(--primary-light);background:#fff}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--accent);color:#fff}
.btn-success:hover{background:var(--accent-light)}
.btn-warning{background:var(--gold);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg)}
th{padding:12px 16px;font-size:12px;font-weight:700;color:var(--text-muted);text-align:right;letter-spacing:0.5px}
td{padding:13px 16px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(240,244,248,0.6)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-success{background:rgba(39,174,96,0.1);color:#27ae60}
.badge-danger{background:rgba(231,76,60,0.1);color:#e74c3c}
.badge-warning{background:rgba(243,156,18,0.1);color:#f39c12}
.badge-info{background:rgba(41,128,185,0.1);color:#2980b9}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:20px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:8px}
.modal-header h3{font-size:18px;font-weight:700;color:var(--primary)}
.modal-close{background:var(--bg);border:none;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;color:var(--text-muted);transition:all 0.2s}
.modal-close:hover{background:var(--danger);color:#fff}
.modal-body{padding:8px 28px 28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:0}
.form-group.full{grid-column:span 2}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;transition:all 0.2s;direction:rtl;color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-light);background:#fff;box-shadow:0 0 0 3px rgba(41,128,185,0.1)}
.form-group textarea{resize:vertical;min-height:80px}
.modal-footer{padding:0 28px 24px;display:flex;gap:12px;justify-content:flex-end}

/* TOAST */
.toast-container{position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--white);border-radius:12px;padding:14px 20px;box-shadow:0 8px 30px rgba(0,0,0,0.15);display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600;animation:slideIn 0.3s ease;border-right:4px solid var(--accent);min-width:280px}
.toast.error{border-right-color:var(--danger)}
.toast.warning{border-right-color:var(--gold)}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--white);border-radius:16px;padding:24px;border:1px solid var(--border)}
.chart-card h3{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:140px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;background:linear-gradient(to top,var(--primary),var(--primary-light));border-radius:6px 6px 0 0;transition:height 0.8s cubic-bezier(0.34,1.56,0.64,1);min-height:4px;cursor:pointer}
.bar:hover{background:linear-gradient(to top,var(--accent),var(--accent-light))}
.bar-label{font-size:10px;color:var(--text-muted);font-weight:700;white-space:nowrap}
.bar-val{font-size:10px;color:var(--primary);font-weight:700}
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.donut{position:relative;width:120px;height:120px;margin:0 auto 16px}
.donut svg{transform:rotate(-90deg)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center .pct{font-size:22px;font-weight:900;color:var(--primary)}
.donut-center .lbl{font-size:10px;color:var(--text-muted)}
.donut-legend{display:flex;flex-direction:column;gap:8px;width:100%}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);transition:all 0.2s}
.tab.active{background:var(--white);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}

/* PAGE SECTIONS */
.page-section{display:none}
.page-section.active{display:block}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary-light);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* STUDENT PROFILE */
.profile-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:16px;padding:28px;color:#fff;display:flex;align-items:center;gap:20px;margin-bottom:24px}
.profile-avatar{width:70px;height:70px;background:rgba(255,255,255,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.profile-info h2{font-size:22px;font-weight:700}
.profile-info p{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.profile-stat{background:var(--white);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border)}
.profile-stat h4{font-size:20px;font-weight:900;color:var(--primary)}
.profile-stat p{font-size:11px;color:var(--text-muted);margin-top:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.4}
.empty-state p{font-size:14px}

/* WHATSAPP */
.wa-btn{background:#25d366;color:#fff;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
.wa-btn:hover{background:#128c7e}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:span 1}
  .chart-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">
      <h2>مسار</h2>
      <p>المركز التعليمي</p>
    </div>
  </div>
  <nav>
    <div class="nav-section">الرئيسية</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="icon">📊</span> لوحة التحكم
    </div>
    <div class="nav-section">إدارة</div>
    <div class="nav-item" onclick="showPage('applicants')">
      <span class="icon">📝</span> الطلاب المقدمين
    </div>
    <div class="nav-item" onclick="showPage('students')">
      <span class="icon">👥</span> الطلاب
    </div>
    <div class="nav-item" onclick="showPage('teachers')">
      <span class="icon">👨‍🏫</span> المعلمون
    </div>
    <div class="nav-item" onclick="showPage('groups')">
      <span class="icon">📚</span> المجموعات
    </div>
    <div class="nav-section">المالية</div>
    <div class="nav-item" onclick="showPage('payments')">
      <span class="icon">💰</span> المدفوعات <span class="badge" id="unpaid-badge" style="display:none">0</span>
    </div>
    <div class="nav-item" onclick="showPage('expenses')">
      <span class="icon">📋</span> المصروفات
    </div>
    <div class="nav-section">الدراسة</div>
    <div class="nav-item" onclick="showPage('attendance')">
      <span class="icon">✅</span> الحضور والغياب
    </div>
    <div class="nav-item" onclick="showPage('results')">
      <span class="icon">📝</span> النتائج والدرجات
    </div>
    <div class="nav-section">التقارير</div>
    <div class="nav-item" onclick="showPage('reports')">
      <span class="icon">📈</span> التقارير
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">م</div>
      <span class="user-name" id="user-name-display">المدير</span>
      <button class="logout-btn" onclick="window.location.href='/logout'">خروج</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">
    <div class="page-title" id="page-title">لوحة التحكم</div>
    <div class="header-actions">
      <button class="header-btn" onclick="refreshPage()">🔄 تحديث</button>
      <button class="header-btn" id="header-add-btn" style="display:none">+ إضافة جديد</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><br>جاري التحميل...</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
// ===================== STATE =====================
const state = {
  page: 'dashboard',
  students: [], teachers: [], groups: [], grades: [], subjects: [],
  currentStudent: null
};

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', async () => {
  await loadLookups();
  showPage('dashboard');
  setUserDisplay();
});

function setUserDisplay(){
  // set from cookie/session via API if needed
}

async function loadLookups(){
  try{
    const [gr, sub] = await Promise.all([
      fetch('/api/grades').then(r=>r.json()),
      fetch('/api/subjects').then(r=>r.json())
    ]);
    state.grades = gr;
    state.subjects = sub;
  } catch(e){}
}

// ===================== NAVIGATION =====================
function showPage(page){
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  
  const titles = {
    dashboard:'لوحة التحكم', applicants:'الطلاب المقدمين', students:'الطلاب', teachers:'المعلمون',
    groups:'المجموعات', payments:'المدفوعات', expenses:'المصروفات',
    attendance:'الحضور والغياب', results:'النتائج والدرجات', reports:'التقارير'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  
  const addBtn = document.getElementById('header-add-btn');
  const addActions = {
    applicants: () => null,
    students: () => showAddStudentModal(),
    teachers: () => showAddTeacherModal(),
    groups: () => showAddGroupModal(),
    expenses: () => showAddExpenseModal()
  };
  
  if(addActions[page]){
    addBtn.style.display = 'flex';
    addBtn.onclick = addActions[page];
    addBtn.textContent = '+ إضافة جديد';
  } else {
    addBtn.style.display = 'none';
  }
  
  // استدعاء الدالة المناسبة مع معالجة الأخطاء
  try {
    switch(page) {
      case 'dashboard': renderDashboard(); break;
      case 'applicants': renderApplicants(); break;
      case 'students': renderStudents(); break;
      case 'teachers': renderTeachers(); break;
      case 'groups': renderGroups(); break;
      case 'payments': renderPayments(); break;
      case 'expenses': renderExpenses(); break;
      case 'attendance': renderAttendance(); break;
      case 'results': renderResults(); break;
      case 'reports': renderReports(); break;
      default: console.log('Page not found:', page);
    }
  } catch(error) {
    console.error('Error loading page:', error);
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading"><div class="spinner"></div><br>حدث خطأ في تحميل الصفحة</div>';
  }
}

function refreshPage(){ showPage(state.page); }

// ===================== DASHBOARD =====================
async function renderDashboard(){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><br>جاري تحميل البيانات...</div>';
  
  const data = await fetch('/api/dashboard').then(r=>r.json());
  
  // Update unpaid badge
  if(data.unpaid_students > 0){
    const badge = document.getElementById('unpaid-badge');
    badge.textContent = data.unpaid_students;
    badge.style.display = 'inline';
  }
  
  const maxIncome = Math.max(...data.monthly_stats.map(m => m.income), 1);
  const barsHTML = data.monthly_stats.map(m => `
    <div class="bar-wrap">
      <div class="bar-val">${m.income > 0 ? (m.income/1000).toFixed(1)+'k' : ''}</div>
      <div class="bar" style="height:${(m.income/maxIncome)*100}%" title="${m.month}: ${m.income.toLocaleString()} جنيه"></div>
      <div class="bar-label">${m.month}</div>
    </div>
  `).join('');
  
  const paidPct = data.paid_students + data.unpaid_students > 0 ?
    Math.round(data.paid_students/(data.paid_students+data.unpaid_students)*100) : 0;
  const r = 52, circ = 2*Math.PI*r;
  const offset = circ - (paidPct/100)*circ;
  
  const recentHTML = data.recent_payments.length ? data.recent_payments.map(p => `
    <tr>
      <td><strong>${p.student_name}</strong></td>
      <td><span class="badge badge-success">${p.amount.toLocaleString()} جنيه</span></td>
      <td>${MONTHS_AR[p.month] || p.month} ${p.year}</td>
      <td>${p.payment_date ? p.payment_date.split('T')[0] : ''}</td>
      <td><button class="btn btn-sm btn-outline" onclick="openReceipt(${p.id})">🖨️ إيصال</button></td>
    </tr>
  `).join('') : '<tr><td colspan="5" class="loading">لا توجد مدفوعات</td></tr>';
  
  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">👥</div>
        <div class="stat-info"><h3>${data.total_students}</h3><p>الطلاب النشطون</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">💰</div>
        <div class="stat-info"><h3>${(data.monthly_income/1000).toFixed(1)}k</h3><p>إيرادات ${data.current_month}</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon gold">👨‍🏫</div>
        <div class="stat-info"><h3>${data.total_teachers}</h3><p>المعلمون النشطون</p></div>
      </div>
      <div class="stat-card">

const MONTHS_AR = {1:'يناير',2:'فبراير',3:'مارس',4:'أبريل',5:'مايو',6:'يونيو',7:'يوليو',8:'أغسطس',9:'سبتمبر',10:'أكتوبر',11:'نوفمبر',12:'ديسمبر'};

// ===================== STUDENTS =====================
async function renderStudents(search=''){
  const content = document.getElementById('content');
  let url = '/api/students?status=active';
  if(search) url += '&search=' + encodeURIComponent(search);
  
  const students = await fetch(url).then(r=>r.json());
  state.students = students;
  
  const gradesOptions = state.grades.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
  
  const rows = students.length ? students.map(s => `
    <tr>
      <td><strong>${s.name}</strong><br><small style="color:var(--text-muted)">${s.grade_name||''}</small></td>
      <td>${s.phone||'-'}</td>
      <td>${s.parent_name||'-'}</td>
      <td>${s.parent_phone||'-'}</td>
      <td>${s.group_name||'-'}</td>
      <td>
        <button class="btn btn-sm btn-primary" onclick="viewStudent(${s.id})">👁️ عرض</button>
        <button class="btn btn-sm btn-success" onclick="showPaymentModal(${s.id},'${s.name}')">💰 دفع</button>
        ${s.parent_whatsapp ? `<button class="wa-btn" style="padding:6px 10px;font-size:11px" onclick="sendWhatsApp('${s.parent_whatsapp}','${s.name}')">📱 واتساب</button>` : ''}
      </td>
    </tr>
  `).join('') : `<tr><td colspan="6"><div class="empty-state"><div class="icon">👥</div><p>لا يوجد طلاب${search ? ' بهذا البحث' : ''}</p></div></td></tr>`;
  
  content.innerHTML = `
    <div class="table-card">
      <div class="table-header">
        <h3>👥 الطلاب (${students.length})</h3>
        <div class="table-actions">
          <input class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف..." id="student-search" value="${search}" oninput="debounce(()=>renderStudents(this.value),400)">
          <button class="btn btn-outline" onclick="window.location.href='/api/export/students'" title="تصدير إكسيل">📊 Excel</button>
          <button class="btn btn-outline" onclick="showImportModal()">📥 استيراد</button>
          <button class="btn btn-primary" onclick="showAddStudentModal()">+ طالب جديد</button>
        </div>
      </div>
      <table>
        <thead><tr><th>الطالب</th><th>الهاتف</th><th>ولي الأمر</th><th>هاتف ولي الأمر</th><th>المجموعة</th><th>إجراءات</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  
  document.getElementById('student-search').addEventListener('input', function(){
    clearTimeout(window._st);
    window._st = setTimeout(() => renderStudents(this.value), 400);
  });
}

function updateAttRow(id, status){
  const data = window._attendanceData || [];
  const rec = data.find(r=>r.student_id===id);

  const badge = document.getElementById(`att-badge-${id}`);
  if(badge){
    badge.className = `badge ${status==='present'?'badge-success':'badge-danger'}`;
    badge.textContent = status==='present'?'حاضر':'غائب';
  }
}

// ===================== MODAL SYSTEM =====================
let modalCallback = null;

function showModal(id, bodyHTML, title, onSave){
  const existing = document.getElementById(id);
  if(existing) existing.remove();
  
  modalCallback = onSave;
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = id;
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${title||''}</h3>
        <button class="modal-close" onclick="closeModal('${id}')">✕</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      ${onSave ? `
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('${id}')">إلغاء</button>
        <button class="btn btn-primary" onclick="modalCallback && modalCallback()">💾 حفظ</button>
      </div>` : ''}
    </div>
  `;
  
  document.body.appendChild(modal);
  requestAnimationFrame(() => modal.classList.add('show'));
  
  modal.addEventListener('click', e => {
    if(e.target === modal) closeModal(id);
  });
}

function closeModal(id){
  const modal = document.getElementById(id);
  if(modal){
    modal.classList.remove('show');
    setTimeout(()=>modal.remove(), 200);
  }
}

function switchTab(btn, tabId){
  btn.closest('.tabs') && btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  
  const parent = btn.closest('.modal-body') || document.getElementById('content');
  parent.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  const target = document.getElementById(tabId);
  if(target) target.classList.add('active');
}

// ===================== TOAST =====================
function toast(msg, type='success'){
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✗':'⚠'}</span> ${msg}`;
  container.appendChild(el);
  setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translateX(-100%)';
    el.style.transition='all 0.3s';
    setTimeout(()=>el.remove(), 300);
  }, 3500);
}

// ===================== APPLICANTS =====================
async function renderApplicants(search = ''){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><br>جاري تحميل البيانات...</div>';
  
  try {
    const response = await fetch(`/api/applicants${search ? '?search=' + encodeURIComponent(search) : ''}`);
    console.log('Response status:', response.status);
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const data = await response.json();
    console.log('Applicants data:', data);
    
    const applicants = data.applicants || data || [];
    console.log('Applicants array:', applicants);
    
    const rows = applicants.map(a => {
      console.log('Processing applicant:', a);
      return `
        <tr>
          <td><strong>${a.name || '-'}</strong></td>
          <td>${a.phone || '-'}</td>
          <td>${a.parent_name || '-'}</td>
          <td>${a.age || '-'}</td>
          <td>${a.program || '-'}</td>
          <td>${a.preferred_time || '-'}</td>
          <td>${a.submission_date ? a.submission_date.split('T')[0] : '-'}</td>
          <td>
            <span class="badge ${a.status === 'pending' ? 'badge-warning' : a.status === 'approved' ? 'badge-success' : 'badge-danger'}">
              ${a.status === 'pending' ? 'في الانتظار' : a.status === 'approved' ? 'مقبول' : 'مرفوض'}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="viewApplicant(${a.id})">👁️ عرض</button>
            ${a.status === 'pending' ? `
              <button class="btn btn-sm btn-success" onclick="approveApplicant(${a.id})">✓ قبول</button>
              <button class="btn btn-sm btn-danger" onclick="rejectApplicant(${a.id})">✗ رفض</button>
            ` : ''}
          </td>
        </tr>
      `;
    }).join('');
    
    if (!rows || rows.length === 0) {
      content.innerHTML = `
        <div class="table-card">
          <div class="table-header">
            <h3>📝 الطلاب المقدمين</h3>
            <div class="table-actions">
              <input class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف..." id="applicant-search" value="${search}" oninput="debounce(()=>renderApplicants(this.value),400)">
              <button class="btn btn-outline" onclick="exportApplicants()">📊 Excel</button>
            </div>
          </div>
          <div class="empty-state">
            <div class="icon">📝</div>
            <p>لا يوجد طلاب مقدمين${search ? ' بهذا البحث' : ''}</p>
          </div>
        </div>
      `;
    } else {
      content.innerHTML = `
        <div class="table-card">
          <div class="table-header">
            <h3>📝 الطلاب المقدمين (${applicants.length})</h3>
            <div class="table-actions">
              <input class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف..." id="applicant-search" value="${search}" oninput="debounce(()=>renderApplicants(this.value),400)">
              <button class="btn btn-outline" onclick="exportApplicants()">📊 Excel</button>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>ولي الأمر</th>
                <th>العمر</th>
                <th>البرنامج</th>
                <th>الوقت المناسب</th>
                <th>تاريخ التقديم</th>
                <th>الحالة</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }
  } catch (error) {
    console.error('Error loading applicants:', error);
    content.innerHTML = `
      <div class="table-card">
        <div class="empty-state">
          <div class="icon">❌</div>
          <p>حدث خطأ في تحميل البيانات: ${error.message}</p>
          <button class="btn btn-primary" onclick="renderApplicants()">إعادة المحاولة</button>
        </div>
      </div>
    `;
    toast('حدث خطأ في تحميل البيانات', 'error');
  }
}

async function viewApplicant(id) {
  try {
    const response = await fetch(`/api/applicants/${id}`);
    const data = await response.json();
    const a = data.applicant;
    
    showModal('applicant-modal', `
      <div class="modal-header">
        <h3>تفاصيل الطالب المقدم</h3>
        <button class="close-btn" onclick="closeModal('applicant-modal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label>الاسم</label>
            <input type="text" value="${a.name}" readonly>
          </div>
          <div class="form-group">
            <label>الهاتف</label>
            <input type="text" value="${a.phone}" readonly>
          </div>
          <div class="form-group">
            <label>ولي الأمر</label>
            <input type="text" value="${a.parent_name || ''}" readonly>
          </div>
          <div class="form-group">
            <label>العمر</label>
            <input type="text" value="${a.age}" readonly>
          </div>
          <div class="form-group">
            <label>البرنامج</label>
            <input type="text" value="${a.program}" readonly>
          </div>
          <div class="form-group">
            <label>الوقت المناسب</label>
            <input type="text" value="${a.preferred_time || ''}" readonly>
          </div>
          <div class="form-group">
            <label>ملاحظات إضافية</label>
            <textarea readonly>${a.notes || ''}</textarea>
          </div>
          <div class="form-group">
            <label>تاريخ التقديم</label>
            <input type="text" value="${a.submission_date ? a.submission_date.split('T')[0] : ''}" readonly>
          </div>
          <div class="form-group">
            <label>الحالة</label>
            <select id="applicant-status">
              <option value="pending" ${a.status === 'pending' ? 'selected' : ''}>في الانتظار</option>
              <option value="approved" ${a.status === 'approved' ? 'selected' : ''}>مقبول</option>
              <option value="rejected" ${a.status === 'rejected' ? 'selected' : ''}>مرفوض</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('applicant-modal')">إغلاق</button>
        ${a.status === 'pending' ? `
          <button class="btn btn-success" onclick="updateApplicantStatus(${a.id}, 'approved')">✓ قبول</button>
          <button class="btn btn-danger" onclick="updateApplicantStatus(${a.id}, 'rejected')">✗ رفض</button>
        ` : ''}
      </div>
    `);
  } catch (error) {
    console.error('Error viewing applicant:', error);
    toast('حدث خطأ في عرض البيانات', 'error');
  }
}

async function approveApplicant(id) {
  if (confirm('هل أنت متأكد من قبول هذا الطالب؟')) {
    await updateApplicantStatus(id, 'approved');
  }
}

async function rejectApplicant(id) {
  if (confirm('هل أنت متأكد من رفض هذا الطالب؟')) {
    await updateApplicantStatus(id, 'rejected');
  }
}

async function updateApplicantStatus(id, status) {
  try {
    const response = await fetch(`/api/applicants/${id}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    
    if (response.ok) {
      toast(`تم ${status === 'approved' ? 'قبول' : 'رفض'} الطالب بنجاح`, 'success');
      renderApplicants();
      closeModal('applicant-modal');
    } else {
      toast('حدث خطأ في تحديث الحالة', 'error');
    }
  } catch (error) {
    console.error('Error updating applicant status:', error);
    toast('حدث خطأ في تحديث الحالة', 'error');
  }
}

function exportApplicants() {
  window.location.href = '/api/applicants/export';
}

// ===================== UTILS =====================
function debounce(fn, delay){
  clearTimeout(window._debounce);
  window._debounce = setTimeout(fn, delay);
}
</script>
