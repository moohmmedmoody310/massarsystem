<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز مسار التعليمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a3c5e 50%,#0d2137 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:absolute;width:600px;height:600px;background:rgba(41,128,185,0.08);border-radius:50%;top:-200px;right:-100px;animation:float 6s ease-in-out infinite}
body::after{content:'';position:absolute;width:400px;height:400px;background:rgba(39,174,96,0.06);border-radius:50%;bottom:-100px;left:-100px;animation:float 8s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.login-container{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:50px 40px;width:420px;position:relative;z-index:1;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.logo-area{text-align:center;margin-bottom:35px}
.logo-circle{width:80px;height:80px;background:linear-gradient(135deg,#2980b9,#27ae60);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;box-shadow:0 10px 30px rgba(41,128,185,0.4)}
h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:rgba(255,255,255,0.5);font-size:13px}
.form-group{margin-bottom:20px}
label{display:block;color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:8px;font-weight:600}
input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 18px;color:#fff;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:all 0.3s;direction:rtl}
input::placeholder{color:rgba(255,255,255,0.3)}
input:focus{border-color:#2980b9;background:rgba(41,128,185,0.15);box-shadow:0 0 0 3px rgba(41,128,185,0.2)}
.btn-login{width:100%;background:linear-gradient(135deg,#2980b9,#1a6fa0);border:none;border-radius:12px;padding:15px;color:#fff;font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(41,128,185,0.4)}
.btn-login:active{transform:translateY(0)}
.error-msg{background:rgba(231,76,60,0.2);border:1px solid rgba(231,76,60,0.3);border-radius:10px;padding:12px;color:#e74c3c;font-size:13px;text-align:center;margin-top:16px;display:none}
.particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;width:3px;height:3px;background:rgba(255,255,255,0.15);border-radius:50%}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo-area">
    <div class="logo-circle">🎓</div>
    <h1>مركز مسار التعليمي</h1>
    <p class="subtitle">نظام إدارة المركز المتكامل</p>
  </div>
  <div class="form-group">
    <label>اسم المستخدم</label>
    <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username">
  </div>
  <div class="form-group">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">دخول النظام</button>
  <div class="error-msg" id="error-msg"></div>
</div>
<script>
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
async function doLogin(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.querySelector('.btn-login');
  const errMsg = document.getElementById('error-msg');
  
  if(!username || !password){
    showError('برجاء إدخال اسم المستخدم وكلمة المرور');
    return;
  }
  
  btn.textContent = 'جاري التحقق...';
  btn.disabled = true;
  
  try{
    const res = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data = await res.json();
    
    if(data.success){
      btn.textContent = '✓ تم الدخول';
      btn.style.background = 'linear-gradient(135deg,#27ae60,#1e8449)';
      setTimeout(() => window.location.href = '/', 500);
    } else {
      showError(data.message);
      btn.textContent = 'دخول النظام';
      btn.disabled = false;
    }
  } catch(e){
    showError('حدث خطأ في الاتصال');
    btn.textContent = 'دخول النظام';
    btn.disabled = false;
  }
}
function showError(msg){
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
